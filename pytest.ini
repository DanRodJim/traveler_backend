[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    -s
    --tb=short
    --strict-markers
    -p no:warnings
asyncio_mode = auto
markers =
    unit: Unit tests
    integration: Integration tests
    auth: Authentication tests
    trips: Trip tests
    slow: Slow running tests

log_cli = false
log_level = WARNING